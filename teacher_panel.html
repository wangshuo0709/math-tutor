<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高一数学 · 教师面板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#f8fafc;color:#1e293b;min-height:100vh;display:flex;flex-direction:column
}
.login-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
  background:#0f172a;
  background-image:linear-gradient(135deg,#0f172a,#1e293b,#334155);
  display:flex;align-items:center;justify-content:center
}
.login-box{
  background:#fff;border-radius:16px;padding:28px 32px 24px;
  width:380px;max-width:92vw;
  box-shadow:0 20px 60px rgba(0,0,0,.4)
}
.login-logo{font-size:40px;text-align:center;margin-bottom:4px}
.login-title{font-size:18px;font-weight:800;color:#0f172a;text-align:center;letter-spacing:-.3px}
.login-field{margin-bottom:14px}
.login-label{font-size:12px;color:#64748b;margin-bottom:4px;font-weight:500}
.login-field input{
  width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;
  font-size:14px;outline:none;box-sizing:border-box;transition:border-color .15s
}
.login-field input:focus{border-color:#4f46e5}
.login-btn{
  width:100%;padding:10px 0;border:none;border-radius:10px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;text-align:center;
  margin-top:4px;transition:transform .1s;letter-spacing:.3px
}
.login-btn:hover{transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-error{font-size:12px;color:#ef4444;text-align:center;margin-top:6px;display:none}
.header{
  background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;
  padding:.6rem 1.2rem;display:flex;align-items:center;justify-content:space-between
}
.header h1{font-size:1rem;font-weight:700;letter-spacing:-.3px}
.header .sub{font-size:.72rem;color:#94a3b8}

.layout{max-width:900px;margin:0 auto;padding:1.2rem;width:100%;flex:1}

/* Teacher panel */
.tch-summary{display:flex;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tch-card{background:#fff;border-radius:10px;padding:.55rem 1rem;text-align:center;min-width:80px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tch-card .num{font-size:1.25rem;font-weight:700;color:#4f46e5}
.tch-card .label{font-size:.7rem;color:#94a3b8}
.tch-tabs{display:flex;gap:0;margin-bottom:1rem}
.tch-tab{font-size:.82rem;padding:6px 14px;border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer;transition:all .15s}
.tch-tab:first-child{border-radius:8px 0 0 8px}
.tch-tab:last-child{border-radius:0 8px 8px 0}
.tch-tab.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
.tch-tab:not(.active):hover{background:#f1f5f9}
.panel-card{background:#fff;border-radius:12px;padding:1rem 1.2rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tch-student-list{list-style:none}
.tch-student-list li{
  display:flex;align-items:center;justify-content:space-between;
  padding:.45rem .6rem;border-bottom:1px solid #f1f5f9;font-size:.85rem
}
.tch-student-list li:hover{background:#f8fafc}
.tch-student-list .sname{font-weight:600}
.tch-student-list .sinfo{color:#64748b;font-size:.78rem}
.tch-student-list button{padding:.2rem .6rem;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:.73rem;cursor:pointer;transition:all .15s}
.tch-student-list button:hover{background:#eef2ff;border-color:#4f46e5}
.tch-empty{text-align:center;padding:2rem;color:#94a3b8;font-size:.82rem}
.rec-actions{display:flex;gap:.5rem;margin-bottom:.8rem}
.rec-actions button{padding:.3rem .7rem;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:.76rem;cursor:pointer;color:#475569;transition:all .15s}
.rec-actions button:hover{background:#f1f5f9;border-color:#94a3b8}
.rec-actions .danger{color:#ef4444;border-color:#fecaca}
.rec-actions .danger:hover{background:#fef2f2}
.btn-push{padding:.2rem .6rem;border:1px solid #f59e0b;border-radius:8px;background:#fffbeb;color:#d97706;font-size:.73rem;cursor:pointer}
.btn-push:hover{background:#fef3c7;border-color:#d97706}

/* Compose form */
.cp-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem}
.cp-row label{font-size:.78rem;color:#64748b;display:flex;align-items:center;gap:3px}
.cp-row label input[type=number]{width:35px;padding:.1rem;border:1px solid #e2e8f0;border-radius:4px;text-align:center;font-size:.75rem}
.cp-row select{width:100%;padding:.35rem;border:2px solid #e2e8f0;border-radius:6px;font-size:.82rem}
.cp-actions{display:flex;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap}
.cp-actions button{padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem}
.cp-actions .primary{border:none;background:#4f46e5;color:#fff;font-weight:600}
.cp-actions .secondary{border:1px solid #e2e8f0;background:#fff;color:#475569}
.cp-actions .push{border:none;background:#059669;color:#fff;font-weight:600}
.cp-result{display:none;background:#f8fafc;border-radius:8px;padding:.8rem;font-size:.82rem;line-height:1.6;max-height:40vh;overflow-y:auto}

/* Settings modal */
.chat-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);display:none}
.chat-modal.open{display:block}
.chat-modal .chat-head{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1.2rem;border-radius:16px 16px 0 0}
.chat-modal .chat-head h4{font-size:.9rem;font-weight:700;color:#fff}

/* Toast */
.toast-container{position:fixed;bottom:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem}
.toast{padding:.5rem .9rem;border-radius:10px;font-size:.8rem;font-weight:500;background:#1e293b;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .2s}
.toast.success{background:#059669}
.toast.error{background:#ef4444}
.toast.info{background:#4f46e5}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:600px){
  body{font-size:14px}
  .header{padding:.5rem .8rem;flex-wrap:wrap;gap:6px}
  .header h1{font-size:.85rem}
  .header .sub{font-size:.65rem}
  .layout{padding:.6rem;max-width:100%}
  .tch-summary{gap:.6rem}
  .tch-card{padding:.4rem .6rem;min-width:60px;flex:1}
  .tch-card .num{font-size:1rem}
  .panel-card{padding:.6rem}
  .tch-student-list li{flex-wrap:wrap;gap:6px;padding:.35rem .4rem;font-size:.8rem}
  .tch-student-list li>div:first-child{width:100%}
  .tch-student-list li>div:last-child{width:100%;display:flex;gap:4px;flex-wrap:wrap}
  .tch-student-list button{font-size:.68rem;padding:.15rem .45rem}
  .rec-actions{flex-wrap:wrap}
  .rec-actions button{font-size:.7rem;padding:.25rem .5rem}
  .cp-row label{font-size:.7rem}
  .cp-actions{flex-wrap:wrap}
  .cp-actions button{flex:1;min-width:80px;font-size:.75rem;padding:.3rem .5rem}
  .login-box{padding:16px;max-width:96vw}
  .chat-modal{width:90vw!important;max-width:90vw}
  .btn-push{font-size:.68rem;padding:.15rem .45rem}
  .tch-tabs{flex-wrap:wrap}
  .tch-tab{font-size:.75rem;padding:4px 10px}
}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">👨‍🏫</div>
    <div class="login-title">教师面板</div>
    <div style="font-size:12px;color:#94a3b8;text-align:center;margin-top:4px;">请输入教师密码</div>
    <div class="login-divider" style="height:1px;background:#f1f5f9;margin:14px 0"></div>
    <div class="login-field">
      <div class="login-label">教师密码</div>
      <input type="password" id="teacherPass" placeholder="输入教师密码">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">进入教师面板</button>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;text-align:center;">
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <div style="text-align:center;"><div id="qrS" style="margin:0 auto;"></div><div style="font-size:10px;color:#64748b;margin-top:4px;">👤 学生微信扫码</div></div>
        <div style="text-align:center;"><div id="qrT" style="margin:0 auto;"></div><div style="font-size:10px;color:#64748b;margin-top:4px;">👨‍🏫 教师微信扫码</div></div>
      </div>
      <div style="font-size:10px;color:#94a3b8;margin-top:6px;word-break:break-all;" id="netInfo"></div>
    </div>
  </div>
</div>
<script>
function genQr(){
  try{
    var href=window.location.href,base=href.split('?')[0].replace(/\/+$/,'');
    var baseDir=base.substring(0,base.lastIndexOf('/')+1);
    var info=document.getElementById('netInfo');
    if(href.indexOf('http://')===0||href.indexOf('https://')===0){
      if(typeof QRCode!=='undefined'){
        setTimeout(function(){
          new QRCode(document.getElementById('qrS'),{text:baseDir+'math_tutor.html',width:130,height:130,correctLevel:QRCode.CorrectLevel.H});
          new QRCode(document.getElementById('qrT'),{text:base,width:130,height:130,correctLevel:QRCode.CorrectLevel.H});
        },200);
      }
      info.innerHTML='📱 手机扫码访问<br><strong style="color:#4f46e5;font-size:13px;">'+base+'</strong>';
    } else {
      info.innerHTML='💡 双击 start_server.bat 启动服务器后，手机连接同一 WiFi 扫码访问';
    }
  }catch(e){}
}
setTimeout(genQr,300);
</script>

<!-- Header -->
<div class="header">
  <div>
    <h1>👨‍🏫 高一数学 · 教师面板</h1>
    <div class="sub">学生管理 · 组卷 · 个性化推送</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button onclick="openSettings()" style="background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;padding:2px 6px;" title="API设置与密码修改">🔑</button>
    <button onclick="window.close()" style="background:none;border:none;color:#94a3b8;font-size:1rem;cursor:pointer;padding:2px 6px;" title="关闭">✕</button>
  </div>
</div>

<!-- Main Layout -->
<div class="layout" id="mainLayout" style="display:none;">
  <div class="tch-summary">
    <div class="tch-card"><div class="num" id="tchStudents">0</div><div class="label">学生数</div></div>
    <div class="tch-card"><div class="num" id="tchTotal">0</div><div class="label">总题数</div></div>
    <div class="tch-card"><div class="num" id="tchRate">-</div><div class="label">平均正确率</div></div>
  </div>

  <div class="tch-tabs">
    <button class="tch-tab active" data-tab="students">📋 学生管理</button>
    <button class="tch-tab" data-tab="compose">📝 组卷 & 推送</button>
  </div>

  <!-- Tab: 学生管理 -->
  <div class="panel-card" id="tabStudents">
    <div class="rec-actions">
      <button onclick="exportAll()">📥 导出全部</button>
      <button class="danger" onclick="clearAllRecords()">🗑 清空所有记录</button>
    </div>
    <h4 style="font-size:.85rem;color:#475569;margin:.5rem 0 .3rem;">学生列表（点击"推送"分析薄弱点并生成针对性练习）</h4>
    <ul class="tch-student-list" id="tchStudentList"></ul>
    <div id="tchEmpty" class="tch-empty">暂无学生数据</div>
  </div>

  <!-- Tab: 组卷 & 推送 -->
  <div class="panel-card" id="tabCompose" style="display:none;">
    <p style="font-size:.85rem;color:#475569;margin-bottom:.6rem;">选择知识点、题型和分数，自动生成并推送试卷。</p>
    <div class="cp-row">
      <div style="flex:2;min-width:150px;">
        <label style="display:block;margin-bottom:2px;">选题知识点</label>
        <select id="cpKp"><option value="">（全部知识点）</option></select>
      </div>
    </div>
    <div class="cp-row">
      <label style="flex-wrap:wrap;"><input type="checkbox" id="cpSingle" checked> 单选题 <input type="number" id="cpScoreSingle" value="5" min="1" max="20" style="width:35px;"> 分 <input type="number" id="cpCountSingle" value="3" min="0" max="20" style="width:35px;"> 题</label>
      <label style="flex-wrap:wrap;"><input type="checkbox" id="cpMulti" checked> 多选题 <input type="number" id="cpScoreMulti" value="5" min="1" max="20" style="width:35px;"> 分 <input type="number" id="cpCountMulti" value="2" min="0" max="20" style="width:35px;"> 题</label>
      <label style="flex-wrap:wrap;"><input type="checkbox" id="cpFill" checked> 填空题 <input type="number" id="cpScoreFill" value="5" min="1" max="20" style="width:35px;"> 分 <input type="number" id="cpCountFill" value="3" min="0" max="20" style="width:35px;"> 题</label>
      <label style="flex-wrap:wrap;"><input type="checkbox" id="cpSolve"> 解答题 <input type="number" id="cpScoreSolve" value="10" min="1" max="20" style="width:35px;"> 分 <input type="number" id="cpCountSolve" value="2" min="0" max="20" style="width:35px;"> 题</label>
    </div>
    <div class="cp-actions">
      <button class="primary" onclick="generatePaper()">📄 生成试卷</button>
      <button class="secondary" onclick="exportPaper()">📥 导出试卷</button>
      <button class="push" onclick="pushToAll()">📤 推送给所有学生</button>
    </div>
    <div id="cpStudentSelect" style="display:none;margin-bottom:.6rem;padding:.5rem;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;">
      <div style="font-size:.78rem;color:#475569;margin-bottom:.4rem;font-weight:600;">选择推送对象：</div>
      <div id="cpStudentList" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      <button class="push" onclick="pushToSelected()" style="margin-top:.4rem;padding:.3rem .8rem;border:none;border-radius:6px;background:#059669;color:#fff;font-weight:600;cursor:pointer;font-size:.78rem;">📤 推送给选中的学生</button>
    </div>
    <div class="cp-result" id="cpResult"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="chat-modal" id="settingsModal" style="height:auto;width:400px;">
  <div class="chat-head" style="background:#4f46e5;">
    <h4>⚙ 系统设置</h4>
    <button onclick="closeSettings()" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;">✕</button>
  </div>
  <div style="padding:1rem 1.25rem;">
    <p style="font-size:.82rem;color:#64748b;margin-bottom:.5rem;line-height:1.5;">填写文心一言 API Key 启用 AI 出题、深度批改和问答功能。</p>
    <input type="password" id="apiKeyInput" style="width:100%;padding:.5rem .7rem;border:2px solid #e2e8f0;border-radius:8px;font-size:.85rem;outline:none;box-sizing:border-box;" placeholder="粘贴 Bearer Token（bce-v3/ALTAK-xxx/xxx）...">
    <button onclick="saveApiKey()" style="width:100%;margin-top:.5rem;padding:.45rem;border:none;border-radius:8px;background:#4f46e5;color:#fff;font-weight:600;cursor:pointer;font-size:.85rem;">保存 API Key</button>
    <hr style="border:none;border-top:1px solid #f1f5f9;margin:.8rem 0;">
    <p style="font-size:.82rem;color:#64748b;margin-bottom:.3rem;">教师密码管理</p>
    <div style="display:flex;gap:.5rem;">
      <input type="password" id="teacherPwInput" style="flex:1;padding:.45rem .7rem;border:2px solid #e2e8f0;border-radius:8px;font-size:.85rem;outline:none;box-sizing:border-box;" placeholder="新教师密码">
      <button onclick="changePw()" style="padding:.45rem .7rem;border:none;border-radius:8px;background:#7c3aed;color:#fff;font-weight:600;cursor:pointer;font-size:.85rem;">修改</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function sample(arr,n){const c=[...arr];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c.slice(0,n)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function formatSet(s){return '{'+[...s].sort((a,b)=>a-b).join(',')+'}'}
function norm(s){return s.replace(/\s+/g,'').replace(/[\uFF01-\uFF5E]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))}
function isNumEq(a,b){const x=parseFloat(a),y=parseFloat(b);return!isNaN(x)&&!isNaN(y)&&Math.abs(x-y)<1e-9}
function isSetEq(s,a){const r=/-?\d+/g,x=(s.match(r)||[]).map(Number).sort((a,b)=>a-b),y=(a.match(r)||[]).map(Number).sort((a,b)=>a-b);return x.length>0&&x.length===y.length&&x.every((v,i)=>v===y[i])}
function isIntervalEq(s,a){const r=/[-∞\d.]+/g,x=(s.match(r)||[]).map(v=>v==='∞'?'Infinity':v).join(','),y=(a.match(r)||[]).map(v=>v==='∞'?'Infinity':v).join(',');if(!x||!y)return false;const bs=s.replace(/[^()\[\]]/g,''),ba=a.replace(/[^()\[\]]/g,'');return x===y&&bs===ba}

function getUsers(){try{return JSON.parse(localStorage.getItem('math_users')||'{}')}catch{return{}}}
function saveUsers(u){localStorage.setItem('math_users',JSON.stringify(u))}
function getCurrentUser(){try{return JSON.parse(localStorage.getItem('math_current_user')||'null')}catch{return null}}
function setCurrentUser(u){if(u)localStorage.setItem('math_current_user',JSON.stringify(u));else localStorage.removeItem('math_current_user')}
function getTeacherPw(){return localStorage.getItem('math_teacher_pw')||'admin123'}
function setTeacherPw(pw){localStorage.setItem('math_teacher_pw',pw)}
function getApiKey(){return localStorage.getItem('wenxinApiKey')||''}
function setApiKey(key){
  localStorage.setItem('wenxinApiKey',key);
}
function registerUser(name){var u=getUsers();if(u[name])return false;u[name]='';saveUsers(u);return true}

function toast(msg,type){
  const c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='toast '+(type||'');t.textContent=msg;c.appendChild(t);
  setTimeout(function(){t.remove()},3000);
}

function exportCSV(records,label){
  if(!records||!records.length){toast('暂无记录','info');return}
  var csv='时间,知识点,题目,你的答案,正确答案,是否正确,得分\n'+
    records.map(function(r){return '"'+(r.t||'')+'","'+(r.kp||'')+'","'+((r.q||'').replace(/"/g,'""'))+'","'+((r.a||'').replace(/"/g,'""'))+'","'+(r.ca||'')+'","'+(r.ok?'是':'否')+'","'+(r.score||0)+'"'}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='高一数学_教师导出_'+(label||'')+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a);
  toast('已导出 CSV','success');
}

function openSettings(){
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('apiKeyInput').value=getApiKey();
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open')}
function saveApiKey(){
  var k=document.getElementById('apiKeyInput').value.trim();
  if(!k){toast('请输入 API Key','error');return}
  setApiKey(k);closeSettings();
  toast('API Key 已保存','success');
}
function changePw(){
  var pw=document.getElementById('teacherPwInput').value.trim();
  if(!pw||pw.length<4){toast('密码至少 4 位','error');return}
  setTeacherPw(pw);document.getElementById('teacherPwInput').value='';toast('教师密码已更新','success');
}

function doLogin(){
  var pass=document.getElementById('teacherPass').value.trim();
  if(!loginTeacher(pass)){document.getElementById('loginError').textContent='密码错误';document.getElementById('loginError').style.display='block';return}
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('mainLayout').style.display='block';
  initPanel();
}
function loginTeacher(pass){return pass===getTeacherPw()}

function initPanel(){
  renderTeacherPanel();
  var sel=document.getElementById('cpKp');
  sel.innerHTML='<option value="">（全部知识点）</option>'+ALL_KPS.map(function(k){return '<option value="'+k+'">'+k+'</option>'}).join('');
  document.querySelectorAll('.tch-tab').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.tch-tab').forEach(function(x){x.classList.remove('active')});
      b.classList.add('active');
      document.getElementById('tabStudents').style.display=b.dataset.tab==='students'?'':'none';

function renderTeacherPanel(){
  var allRecords;
  try{allRecords=JSON.parse(localStorage.getItem('mathRecords')||'[]')}catch{allRecords=[]}
  var students={};
  allRecords.forEach(function(r){var n=r.student||'unknown';if(!students[n])students[n]={total:0,correct:0};students[n].total++;if(r.ok)students[n].correct++});
  var sn=Object.keys(students),ta=allRecords.length,ca=allRecords.filter(function(r){return r.ok}).length;
  document.getElementById('tchStudents').textContent=sn.length;
  document.getElementById('tchTotal').textContent=ta;
  document.getElementById('tchRate').textContent=ta?Math.round(ca/ta*100)+'%':'-';
  var list=document.getElementById('tchStudentList');list.innerHTML='';
  if(!sn.length){document.getElementById('tchEmpty').style.display='block';return}
  document.getElementById('tchEmpty').style.display='none';
  sn.forEach(function(name){
    var s=students[name],li=document.createElement('li');
    var rate=s.total?Math.round(s.correct/s.total*100)+'%':'-';
    li.innerHTML='<div><span class="sname">👤 '+name+'</span><span class="sinfo"> &nbsp;'+s.total+' 题 · 正确率 '+rate+'</span></div>'+
      '<div style="display:flex;gap:4px;flex-wrap:wrap;"><button onclick="window.open(\'wrong_records.html?student='+name+'\',\'_blank\')">📊 错题</button><button onclick="viewStudent(\''+name+'\')">📥 CSV</button><button class="btn-push" onclick="pushPractice(\''+name+'\')">🎯 推送</button></div>';
    list.appendChild(li);
  });
}

function viewStudent(name){
  var rs;try{rs=JSON.parse(localStorage.getItem('records_'+name)||'[]')}catch{rs=[]}
  if(!rs.length){toast(name+' 暂无记录','info');return}
  var msg='👤 '+name+' — '+rs.length+' 题, 正确 '+rs.filter(function(r){return r.ok}).length+' 题';
  toast(msg,'info');exportCSV(rs,name);
}

function pushPractice(studentName){
  var rs;try{rs=JSON.parse(localStorage.getItem('records_'+studentName)||'[]')}catch{rs=[]}
  if(!rs.length){toast(studentName+' 暂无做题记录','info');return}
  var ks={};rs.forEach(function(r){if(!ks[r.kp])ks[r.kp]={total:0,correct:0};ks[r.kp].total++;if(r.ok)ks[r.kp].correct++});
  var wk=Object.keys(ks).filter(function(k){var s=ks[k];return s.total<3||s.correct/s.total<0.7}).sort(function(a,b){return ks[a].correct/ks[a].total-ks[b].correct/ks[b].total});
  if(!wk.length)wk=Object.keys(ks).sort(function(a,b){return ks[a].total-ks[b].total}).slice(0,3);
  if(!wk.length){toast(studentName+' 暂无薄弱知识点','info');return}
  wk=wk.slice(0,3);var qs=[];
  wk.forEach(function(k){if(KB[k]){for(var i=0;i<5;i++){var q=KB[k]();q._kp=k;qs.push(q)}}});
  for(var i=qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=qs[i];qs[i]=qs[j];qs[j]=t}
  qs=qs.slice(0,10);
  if(!qs.length){toast('无法生成练习','error');return}
  var examData={questions:qs,scores:{single:5,multi:5,fill:5,solve:10},totalScore:qs.reduce(function(s,q){return s+(q.t==='solve'?10:5)},0),generated:new Date().toISOString()};
  localStorage.setItem('exam_'+studentName,JSON.stringify(examData));
  var wl=wk.map(function(k){var s=ks[k];return k+'（正确率 '+Math.round(s.correct/s.total*100)+'%，共 '+s.total+' 题）'}).join('；');
  toast('已为 '+studentName+' 推送 '+qs.length+' 道针对性练习（薄弱点：'+wl+'）','success');
}

function exportAll(){
  var all;try{all=JSON.parse(localStorage.getItem('mathRecords')||'[]')}catch{all=[]}
  exportCSV(all,'all');
}

function clearAllRecords(){
  if(!confirm('确定要清空所有学生记录吗？此操作不可撤销。'))return;
  localStorage.removeItem('mathRecords');
  Object.keys(localStorage).filter(function(k){return k.startsWith('records_')}).forEach(function(k){localStorage.removeItem(k)});
  renderTeacherPanel();toast('所有记录已清空','info');
}

function generatePaper(){
  var kp=document.getElementById('cpKp').value;
  var countMap={single:parseInt(document.getElementById('cpCountSingle').value)||0,multi:parseInt(document.getElementById('cpCountMulti').value)||0,fill:parseInt(document.getElementById('cpCountFill').value)||0,solve:parseInt(document.getElementById('cpCountSolve').value)||0};
  var types=[];var totalNeeded=0;
  if(document.getElementById('cpSingle').checked&&countMap.single>0){types.push('single');totalNeeded+=countMap.single}
  if(document.getElementById('cpMulti').checked&&countMap.multi>0){types.push('multi');totalNeeded+=countMap.multi}
  if(document.getElementById('cpFill').checked&&countMap.fill>0){types.push('fill');totalNeeded+=countMap.fill}
  if(document.getElementById('cpSolve').checked&&countMap.solve>0){types.push('solve');totalNeeded+=countMap.solve}
  if(!types.length||totalNeeded<1){toast('请勾选题型并设置数量 >0','error');return}
  var qs=[],kps=kp?[kp]:ALL_KPS;
  var got={single:0,multi:0,fill:0,solve:0};
  kps.forEach(function(k){if(KB[k]){for(var i=0;i<200;i++){var q=KB[k]();if(got[q.t]!==undefined&&got[q.t]<countMap[q.t]){q._kp=k;qs.push(q);got[q.t]++;if(qs.length>=totalNeeded)break}}}});
  if(!qs.length){toast('无匹配题目','error');return}
  for(var i=qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=qs[i];qs[i]=qs[j];qs[j]=t}
  var scoreMap={single:parseInt(document.getElementById('cpScoreSingle').value)||5,multi:parseInt(document.getElementById('cpScoreMulti').value)||5,fill:parseInt(document.getElementById('cpScoreFill').value)||5,solve:parseInt(document.getElementById('cpScoreSolve').value)||10};
  var totalScore=qs.reduce(function(s,q){return s+(scoreMap[q.t]||5)},0);
  var h='<div style="margin-bottom:.5rem;font-weight:700;font-size:.95rem;">📄 高一数学试卷</div><div style="font-size:.78rem;color:#64748b;margin-bottom:.8rem;">共 '+qs.length+' 题 · 满分 '+totalScore+' 分</div>';
  function tn2(t){var names={single:'单选题',multi:'多选题',fill:'填空题',solve:'解答题'};return names[t]||t}
  var ct='';
  qs.forEach(function(q,i){if(q.t!==ct){ct=q.t;h+='<div style="font-weight:600;margin:.6rem 0 .3rem;color:#4f46e5;">'+tn2(q.t)+'（每题'+scoreMap[q.t]+'分，共'+got[q.t]+'题）</div>'}h+='<div style="margin-bottom:.4rem;padding:.3rem 0;border-bottom:1px dashed #e2e8f0;"><span style="color:#94a3b8;margin-right:4px;">'+(i+1)+'.</span> '+q.q+(q.opts?'<br><span style="font-size:.78rem;">'+q.opts.join('&nbsp;&nbsp;')+'</span>':'')+'</div>'});
  h+='<div style="margin-top:.8rem;padding-top:.5rem;border-top:2px solid #e2e8f0;"><span style="font-weight:600;color:#059669;">参考答案</span></div>';
  qs.forEach(function(q,i){h+='<div style="font-size:.78rem;padding:.15rem 0;">'+(i+1)+'. '+q.a+(q.e?' — '+q.e:'')+'</div>'});
  var r=document.getElementById('cpResult');r.innerHTML=h;r.style.display='block';toast('试卷已生成，共 '+qs.length+' 题，满分 '+totalScore+' 分','success');
  window._lastExam={questions:qs,scores:scoreMap,totalScore:totalScore,generated:new Date().toISOString()};
  showStudentSelector();
}

    }
  }catch(e){}
})();
window.addEventListener('storage',function(e){
  if(e.key)initPanel();
});
</script>
